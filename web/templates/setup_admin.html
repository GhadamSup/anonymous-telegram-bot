<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Bot Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-card">
        <div class="logo">
            <div class="icon">🔐</div>
            <h2>Admin Setup</h2>
            <p>Create your admin account to get started</p>
        </div>
        
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label class="label">Username</label>
                <input type="text" name="username" class="input" placeholder="Choose a username" required autofocus minlength="4">
            </div>
            
            <div class="password-requirements">
                <strong>Password requirements:</strong>
                <ul>
                    <li>At least 12 characters</li>
                    <li>One uppercase letter</li>
                    <li>One lowercase letter</li>
                    <li>One number</li>
                    <li>One special character (!@#$%^&*)</li>
                </ul>
            </div>
            
            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" name="password" class="input" placeholder="Choose a strong password" required minlength="12">
            </div>
            
            <div class="form-group">
                <label class="label">Confirm Password</label>
                <input type="password" name="confirm_password" class="input" placeholder="Confirm your password" required minlength="12">
            </div>
            
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
    </div>
</body>
</html>
